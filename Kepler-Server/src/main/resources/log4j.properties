# Reload4j configuration for the Kepler server.
#
# Two parallel sinks:
#
#   1. CONSOLE -> stdout, picked up by `docker service logs`. Same format the
#      project has always shipped, so existing operator habits don't break.
#   2. FILE -> rolling file under ${kepler.log.dir} (default ./logs). Survives
#      container restarts when the directory is bind-mounted from the host
#      (e.g. /opt/kepler-logs) and is what log shippers (Promtail/Vector) and
#      forensic greps will consume.
#
# Format is tab-separated and friendly to grok/loki parsing:
#   timestamp \t level \t thread \t logger \t MDC \t message
# A future commit can add a JSON encoder (logback or log4j-template-json)
# without touching application code.

log4j.rootLogger=INFO, CONSOLE, FILE

# Console — keeps the existing ergonomics for `docker service logs ...`.
log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
log4j.appender.CONSOLE.Target=System.out
log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout
log4j.appender.CONSOLE.layout.ConversionPattern=%d{ISO8601} %-5p [%c{1}] - %m%n

# File — rolling, persistent. ${kepler.log.dir} is overridable from the JVM
# command line (-Dkepler.log.dir=/var/log/kepler) or environment.
log4j.appender.FILE=org.apache.log4j.RollingFileAppender
log4j.appender.FILE.File=${kepler.log.dir}/server.log
log4j.appender.FILE.MaxFileSize=50MB
log4j.appender.FILE.MaxBackupIndex=10
log4j.appender.FILE.Append=true
log4j.appender.FILE.layout=org.apache.log4j.PatternLayout
log4j.appender.FILE.layout.ConversionPattern=%d{ISO8601}\t%-5p\t%t\t%c\t%X\t%m%n

# Tame chatty third-party loggers. They can be re-enabled at runtime through
# their fully-qualified package if a session-specific deep dive needs them.
log4j.logger.com.zaxxer.hikari=INFO
log4j.logger.io.netty=WARN
